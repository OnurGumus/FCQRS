# Build FCQRS, run the facade test suite, and - on main, after tests pass -
# publish any NuGet package whose version isn't on nuget.org yet
# (--skip-duplicate makes already-published versions a no-op, so publishing
# is driven purely by bumping <Version> in an fsproj).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore tools (paket)
        run: dotnet tool restore
      - name: Build
        run: dotnet build src/FCQRS/FCQRS.fsproj -c Release
      - name: Facade tests
        run: dotnet run --project test/Facade.Tests -c Release
      - name: Samples build
        run: |
          dotnet build sample -c Release
          dotnet build saga_sample -c Release

  publish:
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC token for NuGet Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore tools (paket)
        run: dotnet tool restore
      - name: Pack
        run: |
          for proj in src/FCQRS.Model src/FCQRS.Serialization src/FCQRS.SQLProvider src/FCQRS src/FCQRS.ExpectoTickSpec; do
            dotnet pack "$proj" -c Release -o ./nupkgs
          done
      # Trusted Publishing: exchanges the workflow's OIDC identity for a
      # short-lived nuget.org key - no stored secrets. Requires a Trusted
      # Publishing policy on nuget.org (owner ReverseBlade -> repo
      # OnurGumus/FCQRS -> workflow ci.yaml).
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ReverseBlade
      - name: Push (dependency order, skip already-published versions)
        run: |
          shopt -s nullglob
          for id in FCQRS.Model FCQRS.Serialization FCQRS.SqlProvider FCQRS FCQRS.ExpectoTickSpec; do
            for pkg in ./nupkgs/$id.[0-9]*.nupkg; do
              case "$pkg" in *symbols*) continue ;; esac
              echo "pushing $pkg"
              dotnet nuget push "$pkg" \
                --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            done
          done
