<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#E5484D"/></marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/></marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/></marker>
    <style>
      .title { font-size:24px; font-weight:700; fill:#0F172A; }
      .subtitle { font-size:14px; fill:#475569; }
      .lane-t { font-size:12px; font-weight:700; letter-spacing:0.09em; fill:#94A3B8; }
      .blbl { font-size:16px; font-weight:700; }
      .bsub { font-size:11.5px; }
      .elbl { font-size:12.5px; font-weight:600; }
      .badge { font-size:12px; font-weight:700; fill:#fff; }
    </style>
  </defs>

  <rect width="1000" height="600" fill="#FFFFFF"/>
  <text class="title" x="40" y="44">How FCQRS fits together</text>
  <text class="subtitle" x="40" y="68">A request becomes a command, an actor turns it into stored events, and those events flow to read models and sagas.</text>

  <!-- lanes -->
  <rect x="28" y="94" width="944" height="156" rx="14" fill="#FBFCFE"/>
  <text class="lane-t" x="48" y="116">COMMAND SIDE · WRITE</text>
  <rect x="28" y="420" width="944" height="120" rx="14" fill="#FAFEFB"/>
  <text class="lane-t" x="48" y="442">QUERY SIDE · READ</text>

  <!-- Client -->
  <rect x="40" y="282" width="134" height="92" rx="12" fill="#FEF9C3" stroke="#CA8A04" stroke-width="2"/>
  <text class="blbl" x="107" y="322" text-anchor="middle" fill="#713F12">Client</text>
  <text class="bsub" x="107" y="342" text-anchor="middle" fill="#854D0E">app / HTTP handler</text>

  <!-- Aggregate -->
  <rect x="300" y="120" width="206" height="96" rx="12" fill="#F1F5F9" stroke="#334155" stroke-width="2"/>
  <text class="blbl" x="403" y="158" text-anchor="middle" fill="#0F172A">Aggregate</text>
  <text class="bsub" x="403" y="178" text-anchor="middle" fill="#475569">sharded actor · one per entity</text>
  <text class="bsub" x="403" y="195" text-anchor="middle" fill="#475569">decides · emits events</text>

  <!-- Journal -->
  <rect x="640" y="120" width="186" height="96" rx="12" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
  <text class="blbl" x="733" y="158" text-anchor="middle" fill="#334155">Event journal</text>
  <text class="bsub" x="733" y="178" text-anchor="middle" fill="#64748B">append-only log</text>
  <text class="bsub" x="733" y="195" text-anchor="middle" fill="#64748B">the source of truth</text>

  <!-- Saga -->
  <rect x="300" y="300" width="206" height="96" rx="12" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2"/>
  <text class="blbl" x="403" y="338" text-anchor="middle" fill="#581C87">Saga</text>
  <text class="bsub" x="403" y="358" text-anchor="middle" fill="#6B21A8">reacts to events</text>
  <text class="bsub" x="403" y="375" text-anchor="middle" fill="#6B21A8">issues commands · side effects</text>

  <!-- Projection -->
  <rect x="470" y="440" width="180" height="80" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text class="blbl" x="560" y="476" text-anchor="middle" fill="#14532D">Projection</text>
  <text class="bsub" x="560" y="496" text-anchor="middle" fill="#15803D">folds events into rows</text>

  <!-- Read model -->
  <rect x="730" y="440" width="186" height="80" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text class="blbl" x="823" y="476" text-anchor="middle" fill="#14532D">Read model</text>
  <text class="bsub" x="823" y="496" text-anchor="middle" fill="#15803D">query-ready (SQL, cache…)</text>

  <!-- edges -->
  <path d="M174,306 C 246,252 254,184 298,168" fill="none" stroke="#E5484D" stroke-width="2.5" marker-end="url(#ar-red)"/>
  <circle cx="234" cy="218" r="11" fill="#E5484D"/><text class="badge" x="234" y="222" text-anchor="middle">1</text>
  <text class="elbl" x="250" y="222" fill="#B4262A">command (carries CID)</text>

  <path d="M506,160 L636,160" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-blue)"/>
  <circle cx="571" cy="146" r="11" fill="#2563EB"/><text class="badge" x="571" y="150" text-anchor="middle">2</text>
  <text class="elbl" x="587" y="150" fill="#1D4ED8">persist event</text>

  <path d="M733,216 C 733,366 648,388 574,436" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-blue)"/>
  <circle cx="710" cy="324" r="11" fill="#2563EB"/><text class="badge" x="710" y="328" text-anchor="middle">3</text>
  <text class="elbl" x="726" y="328" fill="#1D4ED8">events, in order</text>

  <path d="M650,480 L726,480" fill="none" stroke="#16A34A" stroke-width="2.5" marker-end="url(#ar-green)"/>
  <circle cx="688" cy="466" r="11" fill="#16A34A"/><text class="badge" x="688" y="470" text-anchor="middle">4</text>

  <path d="M107,374 C 107,556 150,566 230,566 L810,566 C 842,566 823,544 823,522" fill="none" stroke="#16A34A" stroke-width="2.5" marker-end="url(#ar-green)"/>
  <circle cx="450" cy="566" r="11" fill="#16A34A"/><text class="badge" x="450" y="570" text-anchor="middle">5</text>
  <text class="elbl" x="466" y="570" fill="#15803D">query the view</text>

  <!-- saga loop -->
  <path d="M375,216 L375,300" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ar-blue)"/>
  <text class="elbl" x="296" y="262" fill="#1D4ED8" text-anchor="end">events</text>
  <path d="M431,300 L431,216" fill="none" stroke="#E5484D" stroke-width="2.5" marker-end="url(#ar-red)"/>
  <text class="elbl" x="510" y="262" fill="#B4262A">commands</text>
</svg>
