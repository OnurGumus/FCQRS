<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#E5484D"/></marker>
    <marker id="ah-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/></marker>
    <marker id="ah-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/></marker>
    <style>
      .title { font-size:23px; font-weight:700; fill:#0F172A; }
      .subtitle { font-size:14px; fill:#475569; }
      .lane-t { font-size:12px; font-weight:700; letter-spacing:0.09em; fill:#94A3B8; }
      .blbl { font-size:16px; font-weight:700; }
      .bsub { font-size:11.5px; }
      .edge-red { fill:none; stroke:#E5484D; stroke-width:2.5; }
      .edge-blue { fill:none; stroke:#2563EB; stroke-width:2.5; }
      .edge-green { fill:none; stroke:#16A34A; stroke-width:2.5; }
      .elbl { font-size:12.5px; font-weight:600; }
      .badge { font-size:12px; font-weight:700; fill:#fff; }
    </style>
  </defs>

  <rect width="980" height="600" fill="#FFFFFF"/>
  <text class="title" x="40" y="42">FCQRS at a glance</text>
  <text class="subtitle" x="40" y="66">The command side turns requests into stored events. The query side turns those events into views you can read.</text>

  <rect x="28" y="92" width="924" height="150" rx="14" fill="#FBFCFE"/>
  <text class="lane-t" x="48" y="114">COMMAND SIDE · WRITE</text>
  <rect x="28" y="410" width="924" height="120" rx="14" fill="#FAFEFB"/>
  <text class="lane-t" x="48" y="432">QUERY SIDE · READ</text>

  <!-- Client -->
  <rect x="40" y="276" width="132" height="92" rx="12" fill="#FEF9C3" stroke="#CA8A04" stroke-width="2"/>
  <text class="blbl" x="106" y="316" text-anchor="middle" fill="#713F12">Client</text>
  <text class="bsub" x="106" y="336" text-anchor="middle" fill="#854D0E">app / HTTP handler</text>

  <!-- Aggregate -->
  <rect x="300" y="120" width="200" height="92" rx="12" fill="#F1F5F9" stroke="#334155" stroke-width="2"/>
  <text class="blbl" x="400" y="156" text-anchor="middle" fill="#0F172A">Aggregate</text>
  <text class="bsub" x="400" y="176" text-anchor="middle" fill="#475569">sharded actor · one per entity</text>
  <text class="bsub" x="400" y="193" text-anchor="middle" fill="#475569">decides · emits events</text>

  <!-- Journal -->
  <rect x="636" y="120" width="180" height="92" rx="12" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
  <text class="blbl" x="726" y="156" text-anchor="middle" fill="#334155">Event journal</text>
  <text class="bsub" x="726" y="176" text-anchor="middle" fill="#64748B">append-only log</text>
  <text class="bsub" x="726" y="193" text-anchor="middle" fill="#64748B">the source of truth</text>

  <!-- Saga -->
  <rect x="300" y="300" width="200" height="92" rx="12" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2"/>
  <text class="blbl" x="400" y="336" text-anchor="middle" fill="#581C87">Saga</text>
  <text class="bsub" x="400" y="356" text-anchor="middle" fill="#6B21A8">reacts to events</text>
  <text class="bsub" x="400" y="373" text-anchor="middle" fill="#6B21A8">issues commands · side effects</text>

  <!-- Projection -->
  <rect x="470" y="430" width="176" height="80" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text class="blbl" x="558" y="466" text-anchor="middle" fill="#14532D">Projection</text>
  <text class="bsub" x="558" y="486" text-anchor="middle" fill="#15803D">folds events into rows</text>

  <!-- Read model -->
  <rect x="724" y="430" width="180" height="80" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text class="blbl" x="814" y="466" text-anchor="middle" fill="#14532D">Read model</text>
  <text class="bsub" x="814" y="486" text-anchor="middle" fill="#15803D">query-ready (SQL, cache…)</text>

  <!-- 1 client -> aggregate -->
  <path class="edge-red" d="M172,300 C 244,248 252,182 298,166" marker-end="url(#ah-red)"/>
  <circle cx="232" cy="214" r="11" fill="#E5484D"/><text class="badge" x="232" y="218" text-anchor="middle">1</text>
  <text class="elbl" x="248" y="218" fill="#B4262A">command (carries CID)</text>

  <!-- 2 aggregate -> journal -->
  <path class="edge-blue" d="M500,158 L632,158" marker-end="url(#ah-blue)"/>
  <circle cx="566" cy="142" r="11" fill="#2563EB"/><text class="badge" x="566" y="146" text-anchor="middle">2</text>
  <text class="elbl" x="582" y="146" fill="#1D4ED8">persist event</text>

  <!-- 3 journal -> projection -->
  <path class="edge-blue" d="M726,212 C 726,362 640,384 566,426" marker-end="url(#ah-blue)"/>
  <circle cx="704" cy="322" r="11" fill="#2563EB"/><text class="badge" x="704" y="326" text-anchor="middle">3</text>
  <text class="elbl" x="720" y="326" fill="#1D4ED8">events, in order</text>

  <!-- 4 projection -> read model -->
  <path class="edge-green" d="M646,470 L720,470" marker-end="url(#ah-green)"/>
  <circle cx="683" cy="456" r="11" fill="#16A34A"/><text class="badge" x="683" y="460" text-anchor="middle">4</text>

  <!-- 5 client -> read model (query) along bottom -->
  <path class="edge-green" d="M106,368 C 106,548 150,558 230,558 L800,558 C 832,558 814,540 814,512" marker-end="url(#ah-green)"/>
  <circle cx="440" cy="558" r="11" fill="#16A34A"/><text class="badge" x="440" y="562" text-anchor="middle">5</text>
  <text class="elbl" x="456" y="562" fill="#15803D">query the view</text>

  <!-- saga loop -->
  <path class="edge-blue" d="M372,212 L372,300" marker-end="url(#ah-blue)"/>
  <text class="elbl" x="294" y="260" fill="#1D4ED8" text-anchor="end">events</text>
  <path class="edge-red" d="M428,300 L428,212" marker-end="url(#ah-red)"/>
  <text class="elbl" x="506" y="260" fill="#B4262A">commands</text>
</svg>
